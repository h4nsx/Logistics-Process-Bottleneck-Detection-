# Render Blueprint — tạo Web Service + PostgreSQL
# Dashboard: New → Blueprint → connect repo → chọn file render.yaml

databases:
  - name: logistics-db
    databaseName: logistics_db
    user: logistics

services:
  - type: web
    name: logistics-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /health
