# Render Blueprint — đặt ở ROOT repo để Blueprint luôn tìm thấy
# Web Service phải chạy từ thư mục Backend (requirements.txt + alembic + app nằm ở đó)

databases:
  - name: logistics-db
    databaseName: logistics_db
    user: logistics

services:
  - type: web
    name: logistics-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      - key: LOG_LEVEL
        value: "INFO"
    healthCheckPath: /health
